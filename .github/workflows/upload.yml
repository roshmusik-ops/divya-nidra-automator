name: YouTube Shorts Daily Uploader

on:
  schedule:
    # 13:30 UTC is exactly 19:00 (7:00 PM) IST
    - cron: '30 13 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub UI

permissions:
  contents: write # Needed to commit and push changes back (e.g., deleting the uploaded video)

jobs:
  upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth-oauthlib google-auth-httplib2 yt-dlp moviepy==1.0.3

      - name: Reconstruct Secure Authentication Files
        env:
          CLIENT_SECRETS_B64: ${{ secrets.CLIENT_SECRETS_B64 }}
          TOKEN_PICKLE_B64: ${{ secrets.TOKEN_PICKLE_B64 }}
        run: |
          echo "$CLIENT_SECRETS_B64" | base64 --decode > client_secrets.json
          echo "$TOKEN_PICKLE_B64" | base64 --decode > token_channel1.pickle

      - name: Generate Daily Short
        run: |
          python daily_cloud_automation.py

      - name: Run YouTube Uploader Script
        run: |
          python upload_shorts.py --channel channel1

      - name: Commit & Push Changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add .
          # We check if there are any changes (like the video being moved/deleted) and commit them.
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated Video Upload [skip ci]" && git push)
